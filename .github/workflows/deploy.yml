name: "Enterprise Pipeline for NexusForge"

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

permissions:
  contents: read
  security-events: write

jobs:
  verify:
    name: "🛡️ Security & Quality Gate"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Scan for Hardcoded Secrets
        run: |
          echo "Scanning for exposed credentials..."
          if git grep -E -I -q "password:|secret:|api_key:|BEGIN PRIVATE KEY" -- . ':(exclude).github/workflows/'; then
            echo "❌ Potential credentials detected"
            exit 1
          fi
          echo "✅ No obvious secrets found"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Dependency Audit
        run: npm audit --audit-level=high

      - name: Lint & Format Check
        run: |
          npm run lint --if-present
          npm run format:check --if-present

  build:
    name: "🏗️ Build & Test"
    needs: verify
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Tests
        run: npm test

      - name: Build Application
        run: npm run build
        env:
          NODE_ENV: production

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: nexusforge-prod-build
          path: dist
          retention-days: 7

  deploy:
    name: "🚀 Deploy Production"
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: nexusforge-prod-build
          path: ./dist

      - name: Connect To Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Debug Tailscale
        run: |
          echo "===== TAILSCALE STATUS ====="
          tailscale status || true

          echo "===== TAILSCALE IP ====="
          tailscale ip -4 || true

          echo "===== TARGET SERVER ====="
          echo "${{ secrets.SERVER_IP }}"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh

          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

          touch ~/.ssh/known_hosts

          echo "===== SSH KEYSCAN ====="
          ssh-keyscan -T 20 -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts 2>/dev/null || true

          echo "===== KNOWN HOSTS ====="
          cat ~/.ssh/known_hosts || true

      - name: Test SSH Connection
        run: |
          ssh \
            -vvv \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_rsa \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "hostname && whoami && pwd"

      - name: Verify Remote Server
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_rsa \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "mkdir -p /var/www/html && ls -lah /var/www"

      - name: Deploy Files
        run: |
          rsync -avz \
            --delete \
            --progress \
            -e "ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -i ~/.ssh/id_rsa" \
            ./dist/ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }}:/var/www/html/

      - name: Verify Deployment
        run: |
          ssh \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -i ~/.ssh/id_rsa \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_IP }} \
            "ls -lah /var/www/html"

      - name: Upload Debug Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: deployment-debug
          path: |
            ~/.ssh

  post-deploy:
    name: "📊 Smoke Test"
    needs: deploy
    runs-on: ubuntu-latest

    steps:
      - name: Connect To Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TS_AUTHKEY }}

      - name: Health Check
        run: |
          STATUS_CODE=$(curl -o /dev/null -s -w "%{http_code}" http://${{ secrets.SERVER_IP }} || echo "000")

          echo "HTTP STATUS: $STATUS_CODE"

          if [ "$STATUS_CODE" -ne 200 ] && [ "$STATUS_CODE" -ne 304 ]; then
            echo "❌ Health check failed"
            exit 1
          fi

          echo "✅ Application healthy"