name: Deploye NexusForge Frontend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "22"
      
      - name: Install Dependencies
        run: npm install
      
      - name: Build Project
        run: npm run build